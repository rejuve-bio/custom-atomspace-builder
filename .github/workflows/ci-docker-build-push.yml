name: custom-atomspace-builder CI-CD pipeline

on:
  push:
    branches: [ master, develop, 'feature/*' ]
  pull_request:
    branches: [ master, develop ]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}
  IMAGE_NAME: custom-atomspace-builder

jobs:
  build:
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
          
      - name: Run Make build
        run: make build
        
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=raw,value=develop,enable=${{ github.ref == 'refs/heads/develop' }}
            
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # CD Steps
      - name: Test SSH connectivity
        run: |
          echo "Testing Tailscale IP connectivity..."
          ping -c 3 100.67.47.42 || echo "Ping failed"
          
          echo "Testing SSH port..."
          nc -zv 100.67.47.42 22 || echo "Port 22 not reachable"
          
          echo "Testing SSH connection..."
          ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no -i ~/.ssh/id_ed25519 icog-bioai@100.67.47.42 "echo 'SSH test successful'" || echo "SSH failed"

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo '${{ secrets.ANSIBLE_SSH_KEY }}' | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          
      - name: Checkout Ansible repository
        uses: actions/checkout@v4
        with:
          repository: Abdu1964/ansible-deploy_v2.0
          path: ansible-deploy_v2.0
          
      - name: Create dynamic inventory
        run: |
          cd ansible-deploy_v2.0
          mkdir -p inventory
          cat > inventory/hosts.ini <<EOL
          [Custom_Atomspace_builder_Remote]
          localhost ansible_connection=local ansible_become=true
          EOL
          echo "Inventory created:"
          cat inventory/hosts.ini
          
      - name: Deploy with Ansible
        run: |
          cd ansible-deploy_v2.0
          echo "Repository contents:"
          ls -la
          echo "Checking for playbooks:"
          find . -name "*.yml" -o -name "*.yaml" | head -10
          
          ansible-playbook -i inventory/hosts.ini playbooks/deploy_server.yml \
            --tags "Custom_Atomspace_builder_Remote" \
            -e docker_image=${{ env.DOCKER_HUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -v